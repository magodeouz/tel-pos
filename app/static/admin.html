<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tel-POS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <span class="navbar-brand mb-0 h1">Tel-POS Admin</span>
        <a href="/" class="btn btn-outline-light">← POS'a Dön</a>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <!-- Categories -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Kategoriler</h5>
                    </div>
                    <div class="card-body">
                        <form id="categoryForm" class="mb-3">
                            <div class="mb-2">
                                <input type="text" class="form-control" id="categoryName" placeholder="Kategori adı" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Ekle</button>
                        </form>
                        <div id="categoriesList"></div>
                    </div>
                </div>
            </div>

            <!-- Products -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Ürünler</h5>
                    </div>
                    <div class="card-body">
                        <form id="productForm" class="mb-3">
                            <div class="mb-2">
                                <select class="form-select" id="productCategory" required>
                                    <option value="">Kategori seçin</option>
                                </select>
                            </div>
                            <div class="mb-2">
                                <input type="text" class="form-control" id="productName" placeholder="Ürün adı" required>
                            </div>
                            <div class="mb-2">
                                <input type="number" class="form-control" id="productPrice" placeholder="Fiyat" step="0.01" required>
                            </div>
                            <div class="mb-2">
                                <textarea class="form-control" id="productNote" placeholder="Not (isteğe bağlı)" rows="2"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Ekle</button>
                        </form>
                        <div id="productsList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EFE POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container-fluid h-100">
        <!-- Top bar -->
        <nav class="navbar navbar-dark bg-dark">
            <div class="navbar-brand mb-0 h1 d-flex align-items-center">
                <img src="/static/logo.svg" alt="EFE POS" height="40" class="me-2">
                <span>EFE POS</span>
            </div>
            <div class="ms-auto">
                <span id="printerStatus" class="badge bg-danger">Yazıcı: Kontrol Ediliyor</span>
                <span id="currentTime" class="ms-3 text-white"></span>
            </div>
        </nav>

        <div class="row g-0 h-100 mt-3">
            <!-- Left: Orders list -->
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Aktif Siparişler</h5>
                    </div>
                    <div class="card-body" id="ordersList" style="max-height: 70vh; overflow-y: auto;">
                        <p class="text-muted">Yükleniyor...</p>
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-success w-100" id="newOrderBtn">Yeni Sipariş</button>
                    </div>
                </div>
            </div>

            <!-- Center: Order items & total -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title" id="orderTitle">Sipariş Seçin</h5>
                    </div>
                    <div class="card-body" id="orderItems" style="max-height: 40vh; overflow-y: auto;">
                        <p class="text-muted">Lütfen sipariş seçin</p>
                    </div>
                    <div style="max-height: 10vh; overflow-y: auto; border-top: 1px solid #ddd; padding: 10px;">
                        <label for="orderNote" class="form-label mb-2" style="font-size: 0.9rem;">Not:</label>
                        <textarea class="form-control form-control-sm" id="orderNote" placeholder="Sipariş notu..." rows="2" disabled></textarea>
                    </div>
                    <div class="card-footer">
                        <div class="row">
                            <div class="col">
                                <strong>Toplam:</strong>
                            </div>
                            <div class="col text-end">
                                <span id="orderTotal">0.00 TL</span>
                            </div>
                        </div>
                        <div class="row mt-2 g-2">
                            <div class="col">
                                <button class="btn btn-warning w-100" id="payBtn" disabled>Ödeme Al</button>
                            </div>
                            <div class="col">
                                <button class="btn btn-info w-100" id="printBtn" disabled>Yazdır</button>
                            </div>
                            <div class="col">
                                <button class="btn btn-danger w-100" id="cancelBtn" disabled>İptal</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Product categories & items -->
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Ürünler</h5>
                    </div>
                    <div class="card-body" style="max-height: 70vh; overflow-y: auto;">
                        <div id="categoriesContainer">
                            <p class="text-muted">Yükleniyor...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Incoming call modal -->
    <div class="modal fade" id="incomingCallModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">☎️ Gelen Arama</h5>
                </div>
                <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
                    <p><strong>Telefon:</strong> <span id="callPhone"></span></p>
                    <div id="customerInfo" style="display: none;">
                        <hr>
                        <h6>Müşteri Bilgisi</h6>
                        <p><strong>İsim:</strong> <span id="callCustomerName"></span></p>
                        <p><strong>Adres:</strong> <span id="callCustomerAddress"></span></p>
                        <p><strong>Not:</strong> <span id="callCustomerNote"></span></p>

                        <hr>
                        <h6>Geçmiş Siparişler</h6>
                        <div id="customerOrdersList">
                            <p class="text-muted">Siparış yok</p>
                        </div>
                    </div>
                    <div id="newCustomerInfo" style="display: none;" class="alert alert-info">
                        Yeni müşteri - sisteme eklemek ister misiniz?
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Kapat</button>
                    <button type="button" class="btn btn-primary" id="createOrderFromCallBtn">Sipariş Aç</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Customer modal -->
    <div class="modal fade" id="customerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Yeni Müşteri</h5>
                </div>
                <div class="modal-body">
                    <form id="customerForm">
                        <div class="mb-3">
                            <label for="customerPhone" class="form-label">Telefon</label>
                            <input type="tel" class="form-control" id="customerPhone" required>
                        </div>
                        <div class="mb-3">
                            <label for="customerName" class="form-label">Ad</label>
                            <input type="text" class="form-control" id="customerName" required>
                        </div>
                        <div class="mb-3">
                            <label for="customerAddress" class="form-label">Adres</label>
                            <input type="text" class="form-control" id="customerAddress">
                        </div>
                        <div class="mb-3">
                            <label for="customerNote" class="form-label">Not</label>
                            <textarea class="form-control" id="customerNote" rows="2"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">İptal</button>
                    <button type="button" class="btn btn-primary" id="saveCustomerBtn">Kaydet</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
